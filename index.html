<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ikbhal — build in public</title>
  <meta name="description" content="Building little things. Sharing the journey." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <a href="#" class="logo" data-nav="home">ikbhal</a>
        <div class="header-actions">
          <button id="about-btn" aria-label="About">?</button>
          <button id="theme-btn" aria-label="Toggle theme">🌙</button>
        </div>
      </div>
    </header>

    <main id="main-content">
    </main>

  <div id="help-overlay" class="help-overlay hidden">

      </div>
      <div class="help-body">
        <div class="help-section">

        </div>
        <div class="help-section">
          <h3>Connect</h3>
          <div class="contact-grid" style="margin-top:8px">
          </div>
        </div>
        <div class="help-section" style="border-top:1px solid var(--border);padding-top:16px;margin-top:8px">
          <h3>About This Blog</h3>
          <p>Built with plain HTML, CSS, JS + Markdown. Deployed on Vercel. No frameworks, no CMS, no tracking.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>

</html>
